<body class="bg-[#F8FAFC]">
    <div class="border-b border-gray-200 bg-white">
        <nav class="md:w-[70%] w-[90%] mx-auto py-[17px] flex justify-between items-center flex-wrap">
            <div class=" flex items-center gap-1">
                <img class="w-9 h-[37px]" src="./assets/github-logo.png" alt="">
                <p class="text-[#1F2937] text-6 font-semibold">GitHub Issues Tracker</p>
            </div>
            <div class="mt-2 flex-wrap md:mt-0 flex items-center gap-4">
                <div class=" relative ">
                    <input class=" border border-gray-300 rounded-md text-gray-400  text-[16px] py-4  pl-9 " type="text"
                        id="search" placeholder="Search issues...">
                    <i class="fa-solid fa-magnifying-glass w-4 h-4 absolute text-gray-300 left-3 top-5.5"></i>
                </div>
                <div>
                    <button id="newIssue-btn" class=" bg-[#4A00FF] text-white font-normal text-[14px] p-2 rounded-lg hover:bg-blue-400 
               md:text-[16px] md:font-semibold md:p-4 flex items-center gap-2"><span><i
                                class="fa-solid fa-plus "></i></span>New Issue</button>
                </div>
            </div>
        </nav>
    </div>

    <div class="md:w-[80%] mt-15 w-[90%] mx-auto gap-2 p-6 rounded-lg shadow bg-white flex flex-wrap">
        <button onclick="toggleStyle('all-btn')" id="all-btn"
            class="text-[16px]  py-3 px-5 md:px-[38.5px] rounded-lg font-semibold border border-gray-300 bg-[#4A00FF] text-white  hover:bg-blue-400  ">ALL</button>
        <button onclick="toggleStyle('open-btn')" id="open-btn"
            class="text-[16px] font-semibold py-3 px-5 md:px-[38.5px] rounded-lg border border-gray-300 bg-white text-gray-400  hover:bg-blue-400 hover:text-white  ">Open</button>
        <button onclick="toggleStyle('closed-btn')" id="closed-btn"
            class="text-[16px] font-semibold py-3 px-5 md:px-[38.5px] rounded-lg border border-gray-300 bg-white text-gray-400  hover:bg-blue-400 hover:text-white ">Closed</button>
    </div>

    <main class="md:w-[80%] mt-4 w-[90%] mx-auto flex-wrap  rounded-lg shadow bg-white">

        <section>
            <div class="flex   justify-between p-6">
                <div class="flex flex-wrap items-center gap-2">
                    <div class="bg-gray-300 w-[50px] h-[50px]  p-3 rounded-full">
                        <img src="./assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <h3 class="font-semibold text-[20px]"><span id="issuesNo">50</span> Issues</h3>
                        <p class="text-[16px] text-gray-400">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex gap-4">
                    <div class="flex items-center gap-2">
                        <div class="rounded-full w-3 h-3 bg-green-700"></div>
                        <p class="font-[16px]">Open</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="rounded-full w-3 h-3 bg-purple-600"></div>
                        <p class="font-[16px]">Closed</p>
                    </div>
                </div>

            </div>
        </section>
        <hr class="border-gray-200">

        <section id="spinner" class="flex justify-center items-center py-10 hidden">
            <span class="w-10 h-10 border-4 border-gray-300 border-t-blue-600 rounded-full animate-spin"></span>
        </section>

        <section class="p-6">
            <div id="issues-container" class="grid md:grid-cols-4 gap-3 grid-cols-1 mx-auto">
