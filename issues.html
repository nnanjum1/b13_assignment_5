<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-[#F8FAFC]">
    <div class="border-b border-gray-200 bg-white">
        <nav class="md:w-[70%] w-[90%] mx-auto py-[17px] flex justify-between items-center flex-wrap">
            <div class=" flex items-center gap-1">
                <img class="w-9 h-[37px]" src="./assets/github-logo.png" alt="">
                <p class="text-[#1F2937] text-6 font-semibold">GitHub Issues Tracker</p>
            </div>
            <div class="mt-2 md:mt-0 flex items-center gap-4">
                <div class=" relative ">
                    <input class=" border border-gray-300 rounded-md text-gray-400  text-[16px] py-4  pl-9 " type="text"
                        id="search" placeholder="Search issues...">
                    <i class="fa-solid fa-magnifying-glass w-4 h-4 absolute text-gray-300 left-3 top-5.5"></i>
                </div>
                <div>
                    <button class="bg-[#4A00FF] text-white font-normal text-[14px] p-2 rounded-lg hover:bg-blue-400 
               md:text-[16px] md:font-semibold md:p-4 flex items-center gap-2"><span><i
                                class="fa-solid fa-plus "></i></span>New Issue</button>
                </div>
            </div>
        </nav>
    </div>

    <div class="md:w-[70%] mt-15 w-[90%] mx-auto gap-2 p-6 rounded-lg shadow bg-white flex">
        <button id="all-btn"
            class="text-[16px] bg-[#4A00FF] py-3 px-[38.5px] rounded-lg font-semibold border border-gray-300 text-white  hover:bg-blue-400  ">ALL</button>
        <button id="open-btn"
            class="text-[16px] font-semibold py-3 px-[38.5px] rounded-lg border border-gray-300 text-gray-400  hover:bg-blue-400 hover:text-white  ">Open</button>
        <button id="closed-btn"
            class="text-[16px] font-semibold py-3 px-[38.5px] rounded-lg border border-gray-300 text-gray-400  hover:bg-blue-400 hover:text-white ">Closed</button>
    </div>

    <main class="md:w-[70%] mt-4 w-[90%] mx-auto  rounded-lg shadow bg-white">
        <section>
            <div class="flex justify-between p-6">
                <div class="flex items-center gap-2">
                    <div class="bg-gray-300 w-[50px] h-[50px]  p-3 rounded-full">
                        <img src="./assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <h3 class="font-semibold text-[20px]"><span id="issuesNo">50</span> Issues</h3>
                        <p class="text-[16px] text-gray-400">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex gap-4">
                    <div class="flex items-center gap-2">
                        <div class="rounded-full w-3 h-3 bg-green-700"></div>
                        <p class="font-[16px]">Open</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="rounded-full w-3 h-3 bg-purple-600"></div>
                        <p class="font-[16px]">Closed</p>
                    </div>
                </div>

            </div>
        </section>
        <hr class="border-gray-200">

        <section class="p-6">
            <div class="grid md:grid-cols-4 gap-3 grid-cols-1">
                <div class="card rounded-md  border-t-2 border-t-green-600 p-4 shadow-md">
                    <div class="flex items-center justify-between">
                        <img class="status-img" src="./assets/Open-Status.png" alt="">
                        <p class="status_text bg-red-100 text-[12px] rounded-2xl py-1.5 px-6 text-red-600">High</p>
                    </div>
                    <div class="mt-3 mb-4">
                        <h2 class="card-title font-semibold">Fix navigation menu on mobile devices</h2>
                        <p class="title-text text-[12px] text-gray-400">The navigation menu doesn't collapse properly on
                            mobile
                            devices...</p>
                        <div class="flex gap-1 mt-3">
                            <button
                                class=" flex items-center text-[12px] rounded-full border border-red-300 bg-red-100 text-red-500 font-medium py-1.5 px-2 gap-1"><span><i
                                        class="fa-solid fa-bug"></i></span>BUG</button>
                            <button
                                class="flex items-center text-[12px] rounded-full border border-orange-300 bg-orange-100 text-orange-700 font-medium py-1.5 px-2 gap-1"><i
                                    class="fa-solid fa-life-ring"></i>HELP
                                WANTED</button>
                        </div>

                    </div>
                    <hr class="border border-gray-300">
                    <div class="my-4">
                        <p class="text-[12px] text-gray-400">#1
                            by john_doe</p>
                        <p class="text-[12px] text-gray-400">1/15/2024</p>
                    </div>

                </div>
            </div>

        </section>
    </main>




    <script src="script.js"></script>
</body>

</html>
