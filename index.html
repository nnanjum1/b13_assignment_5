<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-[#F8FAFC]">
    <div class=" p-8 border-0 rounded-lg shadow my-[78.5px] w-[80%] md:w-[32.5%] mx-auto">
        <div class="flex flex-col items-center text-center">
            <img class="mb-6" src="./assets/github-logo.png" alt="">
            <h2 class="text-xl text-[#1F2937] font-semibold">GitHub Issues Tracker</h2>
            <p class="text-gray-400">Sign in to manage your issues</p>
        </div>
        <div>
            <fieldset>
                <label class="font-medium text-[16px]" for="username">Username</label><br>
                <input class="border-1  border-gray-300 rounded-lg p-4 w-full" type="text" id="username" name="username"
                    placeholder="Enter username"><br>
                <p class="text-[#4A00FF] mb-4">Default: admin</p>

                <label class="font-medium text-[16px]" for="password">Password</label><br>
                <input class="border-1  border-gray-300 rounded-lg p-4 w-full" type="password" id="password"
                    name="password" placeholder="Enter password"><br>
                <p class="text-[#4A00FF]">Default: admin123</p>

                <button
                    class="btn-signIN bg-[#4A00FF]  text-white font-semibold text-[16px] rounded-lg w-full mx-auto py-4 mt-6 hover:bg-blue-400 "
                    type="button">Sign In</button>
            </fieldset>
        </div>
        <div class="flex items-center  my-6 ">
            <hr class="flex-1 border-gray-300">
            <span class="text-[16px] mx-2">OR</span>
            <hr class="flex-1 border-gray-300">
        </div>
        <div class="items-center text-center">
            <p class="text-gray-400 mb-8 ">Demo Credentials:</p>
            <p class="text-[16px]"><span class=" font-semibold">Username:</span> admin</p>
            <p class="text-[16px] mb-6"><span class=" font-semibold">Password:</span> admin123</p>
        </div>
    </div>



    <script src="script.js"></script>
</body>

</html>
